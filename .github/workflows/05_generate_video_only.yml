name: 05 Generate Video Only

on:
  workflow_dispatch:
    inputs:
      video_type:
        description: "Video type"
        required: true
        default: "short"
        type: choice
        options: [short, bedtime, long_story, toby_collection, calming, adventure]

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak-ng fonts-dejavu-core fonts-noto-core fonts-noto-color-emoji fonts-noto-extra

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Generate video
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          TBT_VIDEO_TYPE: ${{ github.event.inputs.video_type }}
        run: python generate_video.py

      - name: Upload rendered video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tiny-brave-tails-output
          path: output/
