name: Upload YouTube Only

on:
  workflow_dispatch:

jobs:
  upload-youtube-only:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak-ng fonts-dejavu-core fonts-noto-core fonts-noto-color-emoji fonts-noto-extra

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate video if missing
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
        run: |
          echo "Checking if MP4 already exists..."
          if find output -name "*.mp4" -type f | grep -q .; then
            echo "MP4 already exists. Skipping video generation."
          else
            echo "No MP4 found. Generating video first..."
            python generate_video.py
          fi

      - name: Verify video exists
        run: |
          echo "Listing output folder:"
          ls -R output || true

          MP4_COUNT=$(find output -name "*.mp4" -type f | wc -l)
          if [ "$MP4_COUNT" -eq 0 ]; then
            echo "No MP4 video found after generation."
            exit 1
          fi

      - name: Upload video to YouTube
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_PRIVACY: private
        run: |
          python upload_youtube.py
