name: 05 Create Upload Animal Adventures

on:
  workflow_dispatch:

jobs:
  create_and_upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg espeak-ng fonts-dejavu-core fonts-noto-core fonts-noto-color-emoji fonts-noto-extra

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Create And Upload
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_PRIVACY: private
        run: python -m tbt_scripts.main --type adventure
