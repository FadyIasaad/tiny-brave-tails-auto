name: 02 Seed Ideas

on:
  workflow_dispatch:
    inputs:
      video_type:
        description: "Type to fill"
        required: true
        default: "all"
        type: choice
        options: [all, short, bedtime, long_story, toby_collection, calming, adventure]
      count_per_type:
        description: "Minimum IDEA rows per selected type"
        required: true
        default: "20"

jobs:
  seed-ideas:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Seed ideas
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          TBT_VIDEO_TYPE: ${{ github.event.inputs.video_type }}
          TBT_COUNT_PER_TYPE: ${{ github.event.inputs.count_per_type }}
        run: python seed_content_ideas.py
