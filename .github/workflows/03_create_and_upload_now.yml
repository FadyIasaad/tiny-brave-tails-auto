name: 03 Create And Upload Now

on:
  workflow_dispatch:
    inputs:
      video_type:
        description: "Video type to create"
        required: true
        default: "short"
        type: choice
        options:
          - short
          - bedtime
          - long_story
          - toby_collection
          - calming
          - adventure
      target_minutes:
        description: "Override minutes. For short use 1. Leave empty for default."
        required: false
        default: ""
      privacy:
        description: "YouTube privacy"
        required: true
        default: "private"
        type: choice
        options:
          - private
          - unlisted
          - public

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak-ng fonts-dejavu-core fonts-noto-core fonts-noto-color-emoji fonts-noto-extra

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate story
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          TBT_VIDEO_TYPE: ${{ github.event.inputs.video_type }}
          TBT_TARGET_MINUTES: ${{ github.event.inputs.target_minutes }}
        run: python generate_story.py

      - name: Generate video
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          TBT_VIDEO_TYPE: ${{ github.event.inputs.video_type }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          EDGE_TTS_VOICE: en-US-AriaNeural
          EDGE_TTS_LONG_VOICE: en-US-AriaNeural
        run: python generate_video.py

      - name: Verify MP4 exists
        run: |
          echo "Listing output folder:"
          ls -R output || true
          MP4_COUNT=$(find output -name "*.mp4" -type f | wc -l)
          if [ "$MP4_COUNT" -eq 0 ]; then
            echo "No MP4 video found after generation."
            exit 1
          fi

      - name: Upload to YouTube
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_PRIVACY: ${{ github.event.inputs.privacy }}
          YOUTUBE_CATEGORY_ID: 24
          TBT_VIDEO_TYPE: ${{ github.event.inputs.video_type }}
        run: python upload_youtube.py

      - name: Upload rendered video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tiny-brave-tails-output
          path: output/
