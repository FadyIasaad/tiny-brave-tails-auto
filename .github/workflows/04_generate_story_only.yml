name: 04 Generate Story Only

on:
  workflow_dispatch:
    inputs:
      video_type:
        description: "Video type"
        required: true
        default: "short"
        type: choice
        options: [short, bedtime, long_story, toby_collection, calming, adventure]
      target_minutes:
        description: "Override minutes"
        required: false
        default: ""

jobs:
  generate-story:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate story
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          TBT_VIDEO_TYPE: ${{ github.event.inputs.video_type }}
          TBT_TARGET_MINUTES: ${{ github.event.inputs.target_minutes }}
        run: python generate_story.py
