name: Create Full Video

on:
  workflow_dispatch:

  schedule:
    # Daily at 13:30 UTC. Adjust this if you want another local publishing time.
    - cron: "30 13 * * *"

concurrency:
  group: tiny-brave-tails-video-pipeline
  cancel-in-progress: false

jobs:
  create-full-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg, fonts, and fallback TTS engine
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak-ng fonts-dejavu-core fonts-liberation
          ffmpeg -version

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python files
        run: |
          python -m py_compile generate_story.py generate_video.py upload_youtube.py

      - name: Generate English cinematic story
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_story.py

      - name: Generate cinematic video
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python generate_video.py

      - name: Upload to YouTube
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_PRIVACY_STATUS: private
          SELF_DECLARED_MADE_FOR_KIDS: "false"
        run: python upload_youtube.py

      - name: Upload generated video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-video-scheduled
          path: output/*.mp4
          if-no-files-found: warn

      - name: Upload generated visuals artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-visuals-scheduled
          path: output/visuals/**
          if-no-files-found: warn

      - name: Upload generated audio artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-audio-scheduled
          path: output/audio/**
          if-no-files-found: warn
